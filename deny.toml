# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
ignore = [
    "RUSTSEC-2021-0139", # ansi_term unmaintained via clap2 in sof-solana-gossip
    "RUSTSEC-2021-0145", # atty unsound via clap2 in sof-solana-gossip
    "RUSTSEC-2022-0093", # ed25519-dalek vulnerability via sof-solana-gossip / solana-runtime
    "RUSTSEC-2024-0344", # curve25519-dalek vulnerability via sof-solana-gossip / solana-runtime
    "RUSTSEC-2024-0375", # atty unmaintained via clap2 in sof-solana-gossip
    "RUSTSEC-2025-0141", # bincode unmaintained
    "RUSTSEC-2024-0384", # instant unmaintained
    "RUSTSEC-2024-0388", # derivative unmaintained
    "RUSTSEC-2024-0436", # paste unmaintained
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained
]

[licenses]
confidence-threshold = 0.93
include-dev = false
private = { ignore = true }

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
    "BSL-1.0",
    "LGPL-2.1-or-later",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
